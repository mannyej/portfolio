<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="../animations/settings.css">
</head>

<body>
    <main class="settings-shell">
        <header class="settings-header">
            <div>
                <p class="eyebrow">System</p>
                <h1 id="settingsTitle" class="typing-target">Settings</h1>
            </div>
            <button class="save-btn typing-target">Save</button>
        </header>

        <section class="settings-grid" aria-label="Settings panels">
            <article class="settings-panel">
                <div class="panel-heading">
                    <h2 class="typing-target">Appearance</h2>
                    <span>Dark</span>
                </div>
                <label class="setting-row">
                    <span>
                        <strong>Glass windows</strong>
                        <small>Blurred panels and soft borders</small>
                    </span>
                    <input type="checkbox" checked>
                </label>
                <label class="setting-row">
                    <span>
                        <strong>Desktop grid</strong>
                        <small>Subtle background scan pattern</small>
                    </span>
                    <input type="checkbox" checked>
                </label>
                <label class="setting-field">
                    <span>Accent strength</span>
                    <input type="range" min="0" max="100" value="72">
                </label>
            </article>

            <article class="settings-panel">
                <div class="panel-heading">
                    <h2 class="typing-target">Dock</h2>
                    <span>Active</span>
                </div>
                <label class="setting-row">
                    <span>
                        <strong>App glow</strong>
                        <small>Highlight running apps in the task bar</small>
                    </span>
                    <input type="checkbox" checked>
                </label>
                <label class="setting-row">
                    <span>
                        <strong>Hover zoom</strong>
                        <small>Scale icons when hovering</small>
                    </span>
                    <input type="checkbox" checked>
                </label>
                <label class="setting-field">
                    <span>Icon size</span>
                    <select>
                        <option>Compact</option>
                        <option selected>Standard</option>
                        <option>Large</option>
                    </select>
                </label>
            </article>

            <article class="settings-panel wide">
                <div class="panel-heading">
                    <h2 class="typing-target">Profile</h2>
                    <span>Portfolio</span>
                </div>
                <div class="profile-card">
                    <div class="avatar">N</div>
                    <div>
                        <strong>Nextech Portfolio</strong>
                        <p>Interactive front-end workspace with desktop-style navigation.</p>
                    </div>
                </div>
                <div class="quick-actions">
                    <button>Reset Layout</button>
                    <button>Open Theme</button>
                    <button>Check Updates</button>
                </div>
            </article>
        </section>
    </main>
    <script src="./scripts/settings.js"></script>
</body>


</html>

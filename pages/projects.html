<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="../animations/projects.css">
</head>

<body>
    <main class="projects-shell">
        <header class="projects-header">
            <div>
                <p class="eyebrow">Portfolio</p>
                <h1>Projects</h1>
            </div>
            <button class="filter-btn">Featured</button>
        </header>

        <section class="project-grid" aria-label="Featured projects">


            <article class="project-card wide">
                <div class="project-topline">
                    <span class="status">Next</span>
                    <span>04</span>
                </div>



                <div class="project-split">
                    <div>
                        <h2>Project Roadmap</h2>
                        <p>More app pages can plug into the dock using the same structure: a page file, a matching
                            stylesheet, and a local app route in the launcher.</p>
                    </div>
                    <div class="meter-list">
                        <label>
                            <span>Polish</span>
                            <progress value="78" max="100"></progress>
                        </label>
                        <label>
                            <span>Animation</span>
                            <progress value="64" max="100"></progress>
                        </label>
                        <label>
                            <span>Content</span>
                            <progress value="52" max="100"></progress>
                        </label>
                    </div>


                </div>
            </article>
        </section>
    </main>
    <script src="./scripts/projects.js" type="module"></script>
</body>

</html>
